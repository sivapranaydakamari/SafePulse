name: SafePulse CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  node-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:coverage

  springboot-emergency-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-springboot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: ./mvnw test

  python-ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: PYTHONPATH=$PWD python -m unittest discover -s tests

  flutter-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flutter-actions/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Run Flutter tests
        working-directory: frontend
        run: flutter test
