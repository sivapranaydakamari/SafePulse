version: '3.9'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: safepulse
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/safepulse
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      NODE_ENV: production
      SPRING_EMERGENCY_SERVICE_URL: http://springboot:8080
      AI_SERVICE_URL: http://ai-service:7000
    ports:
      - "5000:5000"

  springboot:
    build: ./backend-springboot
    restart: unless-stopped
    ports:
      - "8080:8080"

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    ports:
      - "7000:7000"

volumes:
  mongo_data:
