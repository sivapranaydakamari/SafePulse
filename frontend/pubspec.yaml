name: safepulse
description: SafePulse - Real-time safety app
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  firebase_messaging: ^15.1.0
  cloud_firestore: ^5.6.3
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  lottie: ^3.1.2
  http: ^1.6.0
  shared_preferences: ^2.5.3
  sensors_plus: ^7.0.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  flutter_contacts: ^1.1.9+2
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.19.0
  do_not_disturb: ^1.0.3
  cached_network_image: ^3.3.1
  battery_plus: ^7.0.0  
  connectivity_plus: ^7.1.1
  telephony:
    path: packages/telephony_fix
  flutter_phone_direct_caller: ^2.2.1
  tflite_flutter: ^0.12.1
  flutter_tts: ^4.2.5
  screen_state: ^4.1.1
  vibration: ^3.1.8
  torch_light: ^1.1.0
  volume_controller: ^3.4.4
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^19.5.0
  uuid: ^4.5.3
  synchronized: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/crash_model.tflite