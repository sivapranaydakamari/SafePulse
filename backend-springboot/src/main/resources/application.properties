spring.application.name=safepulse-emergency-service
server.address=0.0.0.0
server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:safepulse_emergency;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
