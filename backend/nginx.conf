# backend/nginx.conf — SafePulse reverse proxy
# Terminates TLS and proxies all traffic to the Node.js API Gateway on port 5000.
# See TLS_SETUP.md for certificate provisioning instructions.
#
# Deploy: sudo cp backend/nginx.conf /etc/nginx/sites-available/safepulse
#         sudo ln -sf /etc/nginx/sites-available/safepulse /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

upstream safepulse_gateway {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.safepulse.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.safepulse.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.safepulse.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.safepulse.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # WebSocket upgrade for /ws/tracking real-time hub
    location /ws/ {
        proxy_pass         http://safepulse_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass         http://safepulse_gateway;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
